<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producers Prospect — Recruiter Training Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Producers Prospect Brand Palette — Black / White / Gray */
  --black: #000000;
  --dark-slate: #1A1A1A;
  --dark-text: #111111;
  --body-text: #374151;
  --gray-text: #6B7280;
  --blue: #000000;
  --blue-light: #F3F4F6;
  --pink: #6B7280;
  --pink-light: #9CA3AF;
  --white: #FFFFFF;
  --off-white: #FAFAFA;
  --warm-white: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --green-check: #374151;
  --red-lock: #991B1B;
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.10);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--off-white);
  color: var(--body-text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, .module-header h2, .hero h1 {
  font-family: 'Roboto Condensed', sans-serif;
}

/* ===== HERO ===== */
.hero {
  background: linear-gradient(135deg, #1A1A1A 0%, #111111 50%, var(--black) 100%);
  color: var(--white);
  padding: 48px 24px 56px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(107,114,128,0.08) 0%, transparent 70%);
  border-radius: 50%;
}
.hero-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 28px;
}
.hero-logo img {
  height: 60px;
  width: auto;
  filter: brightness(0) invert(1);
}

.hero h1 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.hero h1 em {
  font-style: normal;
  color: var(--pink);
}
.hero p.subtitle {
  font-family: 'Montserrat', sans-serif;
  font-size: 16px;
  color: rgba(255,255,255,0.7);
  max-width: 620px;
  margin: 0 auto 28px;
  line-height: 1.7;
  font-weight: 400;
}
.hero-tagline {
  display: inline-flex;
  gap: 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 40px;
  padding: 10px 28px;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--pink);
}
.hero-tagline span { opacity: 0.35; color: #fff; }

/* ===== PROGRESS BAR ===== */
.progress-section {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 20px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.progress-inner {
  max-width: 900px;
  margin: 0 auto;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-text);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.progress-label .count {
  color: var(--pink);
  font-weight: 700;
}
.progress-track {
  width: 100%;
  height: 6px;
  background: var(--gray-100);
  border-radius: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--black), #374151);
  border-radius: 6px;
  transition: width 0.5s ease;
  width: 0%;
}

/* ===== MODULE NAV ===== */
.module-nav {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
}
.module-nav::-webkit-scrollbar { height: 4px; }
.module-nav::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }
.nav-inner {
  display: flex;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 16px;
  min-width: max-content;
}
.nav-tab {
  padding: 14px 16px;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-text);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.nav-tab:hover { color: var(--black); }
.nav-tab.active {
  color: var(--black);
  border-bottom-color: var(--pink);
}
.nav-tab.completed .tab-check {
  color: var(--green-check);
  font-size: 14px;
}
.nav-tab.locked {
  opacity: 0.45;
  cursor: not-allowed;
}
.nav-tab .tab-num {
  background: var(--gray-100);
  color: var(--gray-text);
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}
.nav-tab.active .tab-num {
  background: var(--pink);
  color: var(--white);
}
.nav-tab.completed .tab-num {
  background: var(--green-check);
  color: var(--white);
}

/* ===== MODULE CONTENT ===== */
.module-container {
  max-width: 860px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
.module-panel { display: none; }
.module-panel.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.module-header {
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 2px solid var(--gray-100);
}
.module-badge {
  display: inline-block;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--pink);
  background: rgba(107,114,128,0.1);
  padding: 4px 14px;
  border-radius: 4px;
  margin-bottom: 12px;
}
.module-header h2 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: clamp(24px, 4vw, 36px);
  color: var(--black);
  line-height: 1.15;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.module-header p {
  font-size: 15px;
  color: var(--gray-text);
  max-width: 600px;
}

/* Content cards */
.content-card {
  background: var(--white);
  border-radius: 10px;
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0,0,0,0.04);
}
.content-card h3 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--black);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.content-card h3 .icon {
  font-size: 20px;
  flex-shrink: 0;
}
.content-card h4 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--dark-slate);
  margin: 18px 0 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.content-card p {
  font-size: 14px;
  color: var(--body-text);
  line-height: 1.7;
  margin-bottom: 10px;
}
.content-card ul {
  list-style: none;
  padding: 0;
  margin: 8px 0 12px;
}
.content-card ul li {
  padding: 5px 0 5px 24px;
  position: relative;
  font-size: 14px;
  line-height: 1.6;
  color: var(--body-text);
}
.content-card ul li::before {
  content: '▸';
  position: absolute;
  left: 6px;
  color: var(--pink);
  font-weight: 700;
}

/* Comparison table */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 12px 0;
}
@media (max-width: 600px) { .compare-grid { grid-template-columns: 1fr; } }
.compare-col {
  background: var(--gray-100);
  border-radius: 10px;
  padding: 20px;
}
.compare-col.highlight {
  background: linear-gradient(135deg, var(--dark-slate) 0%, var(--black) 100%);
  color: var(--white);
}
.compare-col h4 {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 10px;
  color: inherit;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.compare-col.highlight h4 { color: var(--pink); }
.compare-col ul li { font-size: 13px; }
.compare-col.highlight ul li { color: rgba(255,255,255,0.85); }
.compare-col.highlight ul li::before { color: var(--pink); }

/* Segment cards */
.segment-card {
  background: var(--white);
  border-radius: 10px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--pink);
}
.segment-card h4 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.segment-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-top: 10px;
}
.segment-detail h5 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--pink);
  margin-bottom: 4px;
}
.segment-detail ul { margin: 0; }
.segment-detail ul li { font-size: 13px; padding: 3px 0 3px 20px; }

/* Script blocks */
.script-block {
  background: var(--black);
  color: var(--white);
  border-radius: 10px;
  padding: 24px;
  margin-bottom: 16px;
  position: relative;
}
.script-block h4 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--pink);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.script-block p, .script-block blockquote {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(255,255,255,0.88);
}
.script-block blockquote {
  border-left: 3px solid var(--pink);
  padding-left: 16px;
  margin: 10px 0;
  font-style: italic;
}
.script-block .label {
  display: inline-block;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 3px;
  margin-bottom: 6px;
}
.script-block .label.if-yes { background: var(--green-check); color: #fff; }
.script-block .label.if-no { background: #E67E22; color: #fff; }

/* Cadence timeline */
.cadence-timeline {
  position: relative;
  padding-left: 28px;
  margin: 16px 0;
}
.cadence-timeline::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--gray-200);
}
.cadence-day {
  position: relative;
  margin-bottom: 16px;
  padding-left: 16px;
}
.cadence-day::before {
  content: '';
  position: absolute;
  left: -24px;
  top: 6px;
  width: 12px;
  height: 12px;
  background: var(--pink);
  border-radius: 50%;
  border: 2px solid var(--white);
  box-shadow: 0 0 0 2px var(--pink);
}
.cadence-day strong {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--black);
  display: block;
  margin-bottom: 2px;
  text-transform: uppercase;
}
.cadence-day span {
  font-size: 13px;
  color: var(--gray-text);
}

/* Audit scorecard */
.audit-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--gray-100);
}
.audit-item:last-child { border-bottom: none; }
.audit-num {
  width: 32px;
  height: 32px;
  background: var(--black);
  color: var(--pink);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
}
.audit-item h5 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--black);
  margin-bottom: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.audit-item p { font-size: 13px; color: var(--gray-text); margin: 0; }

/* Score badge */
.score-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin: 12px 0;
}
.score-badge {
  padding: 12px 16px;
  border-radius: 8px;
  text-align: center;
}
.score-badge.tier-1 { background: #E8F5E9; border: 1px solid #A5D6A7; }
.score-badge.tier-2 { background: #FFF8E1; border: 1px solid #FFE082; }
.score-badge.tier-3 { background: #FFF3E0; border: 1px solid #FFCC80; }
.score-badge.tier-4 { background: #FFEBEE; border: 1px solid #EF9A9A; }
.score-badge strong { font-family: 'Roboto Condensed', sans-serif; font-size: 18px; display: block; color: var(--black); }
.score-badge span { font-size: 12px; color: var(--gray-text); }

/* Video list */
.video-item {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  padding: 14px;
  background: var(--gray-100);
  border-radius: 8px;
  margin-bottom: 10px;
}
.video-icon {
  width: 44px;
  height: 44px;
  background: var(--black);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--pink);
  font-size: 18px;
  flex-shrink: 0;
}
.video-item h5 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--black);
  margin-bottom: 2px;
}
.video-item p { font-size: 12px; color: var(--gray-text); margin: 0; }

/* Coach's Note */
.coach-note {
  background: linear-gradient(135deg, rgba(107,114,128,0.06), rgba(107,114,128,0.02));
  border: 1px solid rgba(107,114,128,0.2);
  border-radius: 10px;
  padding: 20px 24px;
  margin: 20px 0;
}
.coach-note h4 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--pink);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.coach-note p {
  font-size: 14px;
  color: var(--body-text);
  line-height: 1.7;
  margin: 0;
}

/* Module complete button */
.module-footer {
  margin-top: 36px;
  padding-top: 24px;
  border-top: 2px solid var(--gray-100);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: 6px;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--pink);
  color: var(--white);
}
.btn-primary:hover { background: var(--pink-light); transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-secondary {
  background: var(--black);
  color: var(--white);
}
.btn-secondary:hover { background: var(--dark-slate); }
.btn-outline {
  background: transparent;
  color: var(--black);
  border: 2px solid var(--gray-200);
}
.btn-outline:hover { border-color: var(--black); }

/* Messaging grid */
.msg-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin: 10px 0;
}
.msg-item {
  padding: 14px 18px;
  background: var(--gray-100);
  border-radius: 6px;
  font-size: 14px;
  color: var(--body-text);
  line-height: 1.6;
  border-left: 3px solid var(--pink);
}
.msg-item.avoid {
  border-left-color: var(--red-lock);
  background: #FFF5F5;
}

/* Key concepts grid */
.concept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin: 12px 0;
}
.concept-item {
  padding: 16px;
  background: var(--gray-100);
  border-radius: 8px;
}
.concept-item h5 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--black);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.concept-item p { font-size: 12px; color: var(--gray-text); margin: 0; line-height: 1.5; }

/* Locked overlay */
.locked-overlay {
  text-align: center;
  padding: 80px 24px;
}
.locked-overlay .lock-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.3;
}
.locked-overlay h3 {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 20px;
  color: var(--black);
  margin-bottom: 8px;
}
.locked-overlay p { font-size: 14px; color: var(--gray-text); }

/* Blue accent section */
.blue-accent-card {
  background: var(--blue);
  color: var(--white);
  border-radius: 10px;
  padding: 24px;
  margin-bottom: 20px;
}
.blue-accent-card h3 {
  color: var(--white);
  font-family: 'Roboto Condensed', sans-serif;
}
.blue-accent-card p { color: rgba(255,255,255,0.88); }
.blue-accent-card ul li { color: rgba(255,255,255,0.88); }
.blue-accent-card ul li::before { color: rgba(255,255,255,0.5); }

/* Responsive */
@media (max-width: 768px) {
  .hero { padding: 32px 16px 40px; }
  .hero-logo img { height: 44px; }
  .hero-tagline { font-size: 11px; gap: 12px; padding: 8px 16px; }
  .module-container { padding: 24px 16px 60px; }
  .content-card { padding: 20px; }
  .nav-tab { padding: 12px 10px; font-size: 11px; }
  .compare-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ===== HERO ===== -->
<header class="hero">
  <div class="hero-logo">
    <img src="https://producersprospect.com/wp-content/uploads/2023/11/logo-offcial-producers-prospects-1.png" alt="Producers Prospect" />
  </div>
  <h1>Recruiter Training <em>Hub</em></h1>
  <p class="subtitle">Your complete field manual for identifying under-supported advisors and showing them why our growth platform is the right move.</p>
  <div class="hero-tagline">
    Prospect <span>|</span> Produce <span>|</span> Prosper
  </div>
</header>

<!-- ===== PROGRESS BAR ===== -->
<div class="progress-section">
  <div class="progress-inner">
    <div class="progress-label">
      <span>Training Progress</span>
      <span class="count" id="progressText">0 of 11 modules complete</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<!-- ===== MODULE NAV ===== -->
<nav class="module-nav">
  <div class="nav-inner" id="navTabs"></div>
</nav>

<!-- ===== MODULE CONTENT ===== -->
<main class="module-container" id="moduleContainer"></main>

<script>
// ===== MODULE DATA =====
const modules = [
  {
    id: 0,
    short: "Quick Start",
    title: "Quick Start Summary",
    desc: "Your mission, success metrics, and the core recruiting thesis.",
    content: `
      <div class="content-card">
        <h3><span class="icon">&#9670;</span> Your Mission</h3>
        <p>Move high-potential advisors and agents into deeper conversation with us by showing them three things:</p>
        <ul>
          <li>Their current IMO may be giving them product access, but not real growth support</li>
          <li>Their digital brand may not reflect the level of advisor they believe they are</li>
          <li>We can help them <strong>prospect better, produce more, and prosper faster</strong></li>
        </ul>
      </div>

      <div class="content-card">
        <h3><span class="icon">&#9670;</span> What Success Looks Like</h3>
        <ul>
          <li>Start strong conversations</li>
          <li>Uncover frustration with the current IMO relationship</li>
          <li>Expose gaps in brand, visibility, follow-up, and sales process</li>
          <li>Create urgency around missed opportunity</li>
          <li>Book qualified meetings</li>
          <li>Help move business relationships over time</li>
        </ul>
      </div>

      <div class="content-card">
        <h3><span class="icon">&#9670;</span> What a Fixed Indexed Annuity Is</h3>
        <p>A fixed indexed annuity is an insurance product designed to provide principal protection from market loss, while crediting interest based on the performance of an external index subject to the contract's rules, limitations, and optional features.</p>

        <ul>
          <li>A direct stock market investment</li>
          <li>A security that gives full market upside</li>

          <li>Principal protection</li>

        <ul>
          <li>People who need full liquidity</li>

          <li>Those who do not understand surrender schedules or contract tradeoffs</li>
        </ul>

        <h3><span class="icon">&#9670;</span> Key Concepts You Must Understand</h3>
        <div class="concept-grid">
          <div class="concept-item">
            <h5>Surrender Charges</h5>
            <p>A time-based penalty schedule if money is withdrawn above allowed limits during the surrender period.</p>
          </div>
          <div class="concept-item">
            <h5>Caps</h5>
            <p>A maximum credited return under a strategy.</p>
          </div>
          <div class="concept-item">
            <h5>Spreads</h5>
            <p>A percentage deducted from the index gain before interest is credited.</p>
          </div>
          <div class="concept-item">
            <h5>Participation Rates</h5>
            <p>The percentage of the index gain used in the crediting formula.</p>
          </div>
          <div class="concept-item">
            <h5>Income Riders / GLWB</h5>
            <p>Optional riders that can create future guaranteed withdrawal benefits, usually for lifetime income.</p>

    desc: "Understand the Deferred Sales Trust strategy, how it works under IRC Section 453, and why it's one of the most powerful capital gains tax deferral tools available to your clients.",
    content: `
      <div class="content-card">
        <h3><span class="icon">&#9670;</span> What Is a Deferred Sales Trust?</h3>
        <p>The Deferred Sales Trust ("DST") is a capital gains tax deferral strategy that offers an attractive and flexible alternative to a 1031 Exchange. It can dramatically decrease or defer the capital gains taxes that would otherwise be recognized in the year of a sale — allowing the seller to generate a potentially higher rate of return by leveraging the pre-tax proceeds, which can be significantly greater than what remains after a fully taxable sale.</p>
        <p style="margin-top:12px;">The DST is a type of IRC Section 453 installment sale, also known as a "seller carry-back" sale. Under this code section, the seller may achieve significant tax-deferral benefits by not receiving actual or constructive receipt of the proceeds at the time of the sale, instead receiving payments over time.</p>
      </div>

      <div class="content-card">
        <h3><span class="icon">&#9670;</span> The Core Problem We Solve</h3>
        <p>Owners of businesses, real estate, and other highly appreciated assets are often reluctant to sell their property due to the significant capital gains tax liability that can result. This reluctance can trap clients in concentrated, illiquid positions — costing them optionality, diversification, and retirement flexibility.</p>
        <div class="msg-grid" style="margin-top:16px;">
          <div class="msg-item">
            <strong>Without a DST</strong>
            <p>The seller faces immediate recognition of the full capital gains tax — often 20% federal, plus state taxes, plus the 3.8% Medicare surtax. On a $10M sale, this can mean $2M+ lost to taxes at closing.</p>
          </div>
          <div class="msg-item">
            <strong>With a DST</strong>
            <p>The seller defers the capital gains tax, retains the pre-tax proceeds working for them inside the trust, and receives payments on a schedule that fits their financial plan — potentially paying $0 in capital gains at closing.</p>
          </div>
        </div>
      </div>

      <div class="content-card">
        <h3><span class="icon">&#9670;</span> How the DST Structure Works</h3>
        <p>When the taxpayer decides to proceed, the ownership of their highly appreciated capital asset is transferred to a dedicated trust. There is generally no capital gains tax immediately owing from this transfer under Section 453, and no capital gains tax liability from the trust's sale to the buyer because there is no capital gain at that level.</p>
        <div class="cadence-timeline" style="margin-top:14px;">
          <div class="cadence-step">
            <div class="cadence-day">Step 1</div>
            <div class="cadence-action"><strong>Seller transfers the asset to the Trust.</strong> The Trust purchases the property from the seller under an installment sales contract. The seller becomes a noteholder (creditor).</div>
          </div>
          <div class="cadence-step">
            <div class="cadence-day">Step 2</div>
            <div class="cadence-action"><strong>Trust sells the asset to the third-party buyer.</strong> The Trust sells the asset at fair market value. Because the Trust purchased at the same price, there is no capital gain at the trust level.</div>
          </div>
          <div class="cadence-step">
            <div class="cadence-day">Step 3</div>
            <div class="cadence-action"><strong>Pre-tax proceeds are invested inside the Trust.</strong> The full pre-tax amount is deployed into a diversified portfolio consistent with the seller's risk tolerance and preferences.</div>
          </div>
          <div class="cadence-step">
            <div class="cadence-day">Step 4</div>
            <div class="cadence-action"><strong>Installment payments are made to the seller over time.</strong> Capital gains tax is only recognized as principal payments are received — spreading the tax liability across many years at potentially lower marginal rates.</div>
          </div>
        </div>
      </div>

      <div class="content-card">
        <h3><span class="icon">&#9670;</span> Key DST Advantages Over a 1031 Exchange</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:14px;">
          <div style="background:var(--gray-100);padding:18px;border-radius:8px;border-left:3px solid var(--black);">
            <strong style="color:var(--dark-text);">No "Like-Kind" Requirement</strong>
            <p style="font-size:13px;margin-top:4px;">Unlike a 1031 Exchange, proceeds do not have to be invested in "like-kind" property within a compressed timeframe. The trust can invest in a diversified portfolio.</p>
          </div>
          <div style="background:var(--gray-100);padding:18px;border-radius:8px;border-left:3px solid var(--black);">
            <strong style="color:var(--dark-text);">Flexible Payment Schedule</strong>
            <p style="font-size:13px;margin-top:4px;">Repayment terms can be structured for minimal principal, rapid amortization, or delayed commencement — whatever serves the seller's planning needs.</p>
          </div>
          <div style="background:var(--gray-100);padding:18px;border-radius:8px;border-left:3px solid var(--black);">
            <strong style="color:var(--dark-text);">Works for Any Appreciated Asset</strong>
            <p style="font-size:13px;margin-top:4px;">Businesses, commercial real estate, investment properties, primary residences, major stock positions, artwork, and collectibles — not just real property.</p>
          </div>
          <div style="background:var(--gray-100);padding:18px;border-radius:8px;border-left:3px solid var(--black);">
            <strong style="color:var(--dark-text);">Can Sever Partnership Interests</strong>
            <p style="font-size:13px;margin-top:4px;">When a partnership sells an appreciated asset, each partner can have their own DST managed to their individual risk tolerance — unlike a 1031 where partners must stay together.</p>
          </div>
        </div>
      </div>

      <div class="coach-note">
        <strong>Recruiter Positioning:</strong> The DST is a conversation-starter with every advisor who works with business owners, real estate investors, or anyone holding a highly appreciated asset. Lead with the problem — "Your clients are trapped in assets they'd sell tomorrow if the tax bill weren't so punishing" — and position the DST as the planning tool that removes the barrier.
      </div>
    `
  },

let currentModule = 0;
let completedModules = new Set();

  const saved = sessionStorage.getItem('pp_completed');
  if (saved) completedModules = new Set(JSON.parse(saved));
} catch(e) {}

// ===== RENDER =====
function saveState() {
  try { sessionStorage.setItem('pp_completed', JSON.stringify([...completedModules])); } catch(e) {}
}

function renderNav() {
  const nav = document.getElementById('navTabs');
  nav.innerHTML = modules.map((m, i) => {
    const isCompleted = completedModules.has(i);
    const isActive = i === currentModule;
    let cls = 'nav-tab';
    if (isActive) cls += ' active';
    if (isCompleted) cls += ' completed';
    return '<div class="' + cls + '" data-idx="' + i + '" onclick="goToModule(' + i + ')">' +
      '<span class="tab-num">' + (isCompleted ? '&#10003;' : (i + 1)) + '</span>' +
      m.short +
    '</div>';
  }).join('');
}

function renderModule() {
  const m = modules[currentModule];
  const isComplete = completedModules.has(currentModule);
  const container = document.getElementById('moduleContainer');

  let footerLeft = '';
  if (currentModule > 0) {
    footerLeft = '<button class="btn btn-outline" onclick="goToModule(' + (currentModule - 1) + ')">&larr; Previous</button>';
  }

  let footerRight = '';
  if (!isComplete) {
    footerRight += '<button class="btn btn-primary" onclick="completeModule(' + currentModule + ')">Mark Complete &#10003;</button>';
  } else {
    footerRight += '<span style="color:var(--green-check);font-weight:700;font-size:14px;font-family:Roboto Condensed,sans-serif;text-transform:uppercase;letter-spacing:1px;">&#10003; Completed</span>';
  }
  if (currentModule < modules.length - 1) {
    footerRight += ' <button class="btn btn-secondary" onclick="goToModule(' + (currentModule + 1) + ')">Next &rarr;</button>';
  }

  container.innerHTML =
    '<div class="module-panel active">' +
      '<div class="module-header">' +
        '<div class="module-badge">Module ' + (currentModule + 1) + ' of ' + modules.length + '</div>' +
        '<h2>' + m.title + '</h2>' +
        '<p>' + m.desc + '</p>' +
      '</div>' +
      m.content +
      '<div class="module-footer">' +
        '<div>' + footerLeft + '</div>' +
        '<div style="display:flex;gap:10px;align-items:center;">' + footerRight + '</div>' +
      '</div>' +
    '</div>';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const pct = (completedModules.size / modules.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = completedModules.size + ' of ' + modules.length + ' modules complete';
}

function goToModule(idx) {
  currentModule = idx;
  renderNav();
  renderModule();
  updateProgress();
}

function completeModule(idx) {
  completedModules.add(idx);
  saveState();
  renderNav();
  renderModule();
  updateProgress();
}

// ===== INIT =====
renderNav();
renderModule();
updateProgress();
</script>
</body>
</html>
